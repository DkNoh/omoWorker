<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="gridCard" class="card shadow-sm border-0 mb-4 toast-grid-card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <span class="fs-6 fw-medium">총 <strong class="text-primary" id="total-count">0</strong>건</span>
        <div class="d-flex align-items-center gap-2">
            <select id="pageSizeSelect" class="form-select form-select-sm toast-grid-page-size">
                <option value="10">10건</option>
                <option value="20">20건</option>
                <option value="50">50건</option>
            </select>
        </div>
    </div>
    <div class="card-body p-0">
        <!-- IMPORTANT: #grid must stay an EMPTY mount point.
             TuiPageBuilder passes this element directly to new tui.Grid({ el }).
             Any children here break TUI's internal DOM construction.
             The no-data hint is a SIBLING overlay toggled from JS. -->
        <div class="toast-grid-shell">
            <div id="grid" class="toast-grid"></div>
            <div class="toast-grid-empty" role="status" aria-live="polite" data-empty-state>
                <i data-lucide="inbox" class="toast-grid-empty-icon" aria-hidden="true"></i>
                <p class="toast-grid-empty-title">조회된 데이터가 없습니다</p>
                <p class="toast-grid-empty-hint">검색 조건을 입력한 뒤 조회 버튼을 눌러 주세요.</p>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white border-0 py-3">
        <div id="pagination" class="d-flex justify-content-center"></div>
    </div>
</div>
</body>
</html>
