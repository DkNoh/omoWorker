# p6spy — local/dev 전용 SQL 로깅 설정.
# prod는 JNDI datasource를 쓰므로 P6SpyDriver가 로드되지 않고 이 파일도 읽지 않는다.
driverlist=oracle.jdbc.OracleDriver
appender=com.p6spy.engine.spy.appender.Slf4JLogger
logger=p6spy
logMessageFormat=com.scbk.sms.config.P6SpyFormatter
excludecategories=info,debug,batch,result,resultset
