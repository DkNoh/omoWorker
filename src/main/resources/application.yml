spring:
  application:
    name: omo-worker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  thymeleaf:
    cache: false
  mvc:
    hidden-method:
      filter:
        enabled: true

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: "NULL"

sms:
  scaffold:
    db-platform: ${SMS_SCAFFOLD_DB_PLATFORM:oracle}

server:
  port: ${SERVER_PORT:8081}
  servlet:
    session:
      tracking-modes: cookie

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# API docs (Swagger UI)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    operations-sorter: alpha
    doc-expansion: none
