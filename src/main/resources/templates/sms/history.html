<!DOCTYPE html>
<!-- Scaffold 생성(v1). 생성 후 개발자가 직접 수정해 소유한다. -->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{defaultLayout}">
<head>
    <title>발송이력조회</title>
</head>
<body>
<main layout:fragment="content">

    <div class="content-header">
        <h2>발송이력조회</h2>
    </div>

    <!-- 검색조건 카드 -->
    <div class="card mb-4 shadow-sm border-0 scaffold-search-card">
        <div class="card-body">
            <div class="row align-items-center g-3 flex-wrap">
                <div class="col-auto"><label for="sendType" class="col-form-label fw-bold">sendType</label></div>
                <div class="col-auto"><select id="sendType" class="form-select scaffold-search-control" aria-label="sendType">
                        <option value="">전체</option>
                        <option value="SMS">SMS</option>
                        <option value="LMS">LMS</option>
                        <option value="MMS">MMS</option>
                        <option value="ALIMTALK">ALIMTALK</option>
                    </select></div>
                <div class="col-auto"><label for="sendStatus" class="col-form-label fw-bold">sendStatus</label></div>
                <div class="col-auto"><select id="sendStatus" class="form-select scaffold-search-control" aria-label="sendStatus">
                        <option value="">전체</option>
                        <option value="SUCCESS">SUCCESS</option>
                        <option value="FAIL">FAIL</option>
                        <option value="SENT">SENT</option>
                        <option value="CANCEL">CANCEL</option>
                    </select></div>
                <div class="col-auto"><label for="sentAt" class="col-form-label fw-bold">sentAt</label></div>
                <div class="col-auto"><div class="scaffold-date-field scaffold-date-field-md"><div class="tui-datepicker-input tui-datetime-input scaffold-datepicker-input"><input type="text" id="sentAt" data-search-type="date" autocomplete="off" aria-label="sentAt"><span class="tui-ico-date" aria-hidden="true"></span></div><div id="sentAtPickerLayer" class="scaffold-date-picker-layer"></div></div></div>
                <div class="col-auto"><label for="receiverNo" class="col-form-label fw-bold">receiverNo</label></div>
                <div class="col-auto"><input type="text" id="receiverNo" class="form-control scaffold-search-control" aria-label="receiverNo"></div>
                <div class="col-auto ms-auto d-flex gap-2">
                    <button type="button" id="btn-search" class="btn btn-primary px-4" aria-label="조회"><i data-lucide="search" aria-hidden="true"></i><span>조회</span></button>
                    <button type="button" id="btn-reset" class="btn btn-secondary px-3" aria-label="검색 조건 초기화"><i data-lucide="rotate-ccw" aria-hidden="true"></i><span>초기화</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI Grid -->
    <div th:replace="~{fragments/toast-grid :: gridCard}"></div>

</main>
<th:block layout:fragment="script">
    <script th:src="@{/js/sms/history.js}"></script>
</th:block>
</body>
</html>
