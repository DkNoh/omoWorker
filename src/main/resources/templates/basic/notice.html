<!DOCTYPE html>
<!-- Scaffold 생성(v1). 생성 후 개발자가 직접 수정해 소유한다. -->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{defaultLayout}">
<head>
    <title>공지사항</title>
</head>
<body>
<main layout:fragment="content">

    <div class="content-header">
        <h2>공지사항</h2>
    </div>

    <!-- 검색조건 카드 -->
    <div class="card mb-4 shadow-sm border-0 scaffold-search-card">
        <div class="card-body">
            <div class="row align-items-center g-3 flex-wrap">
                <div class="col-auto"><label for="searchKeyword" class="col-form-label fw-bold">searchKeyword</label></div>
                <div class="col-auto"><input type="text" id="searchKeyword" class="form-control scaffold-search-control" aria-label="searchKeyword"></div>
                <div class="col-auto"><label for="noticeType" class="col-form-label fw-bold">noticeType</label></div>
                <div class="col-auto"><input type="text" id="noticeType" class="form-control scaffold-search-control" aria-label="noticeType"></div>
                <div class="col-auto"><label for="useYn" class="col-form-label fw-bold">useYn</label></div>
                <div class="col-auto"><input type="text" id="useYn" class="form-control scaffold-search-control" aria-label="useYn"></div>
                <div class="col-auto"><label for="startDate" class="col-form-label fw-bold">startDate</label></div>
                <div class="col-auto d-flex align-items-center gap-2">
                    <div class="scaffold-date-field scaffold-date-field-sm"><div class="tui-datepicker-input tui-datetime-input scaffold-datepicker-input"><input type="text" id="startDate" data-search-type="date" autocomplete="off" aria-label="startDate"><span class="tui-ico-date" aria-hidden="true"></span></div><div id="startDatePickerLayer" class="scaffold-date-picker-layer"></div></div>
                    <span>~</span>
                    <div class="scaffold-date-field scaffold-date-field-sm"><div class="tui-datepicker-input tui-datetime-input scaffold-datepicker-input"><input type="text" id="endDate" data-search-type="date" autocomplete="off" aria-label="endDate"><span class="tui-ico-date" aria-hidden="true"></span></div><div id="endDatePickerLayer" class="scaffold-date-picker-layer"></div></div>
                </div>
                <div class="col-auto ms-auto d-flex gap-2">
                    <button type="button" id="btn-search" class="btn btn-primary px-4" aria-label="조회"><i data-lucide="search" aria-hidden="true"></i><span>조회</span></button>
                    <button type="button" id="btn-reset" class="btn btn-secondary px-3" aria-label="검색 조건 초기화"><i data-lucide="rotate-ccw" aria-hidden="true"></i><span>초기화</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI Grid -->
    <div th:replace="~{fragments/toast-grid :: gridCard}"></div>

</main>
<th:block layout:fragment="script">
    <script th:src="@{/js/basic/notice.js}"></script>
</th:block>
</body>
</html>
